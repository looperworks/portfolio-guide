<svg font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Circular Std', 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#F2F2F2"/>

  <!-- Title section -->
<text x="450" y="45" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Visual Glossary: All Terms in Context</text>

  <!-- Divider line -->
  <line x1="50" y1="60" x2="850" y2="60" stroke="#BBB" stroke-width="1"/>

  <!-- Page cross-section container -->
  <g>
    <!-- Outer page boundary (dark line) -->
    <rect x="200" y="80" width="500" height="500" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>

    <!-- Top page edge label -->
    <line x1="150" y1="80" x2="180" y2="80" stroke="#1A1A1A" stroke-width="1"/>
    <text x="140" y="85" font-size="11" fill="#1A1A1A" text-anchor="end">Page Edge</text>

    <!-- Bottom page edge label -->
    <line x1="150" y1="580" x2="180" y2="580" stroke="#1A1A1A" stroke-width="1"/>
    <text x="140" y="585" font-size="11" fill="#1A1A1A" text-anchor="end">Page Edge</text>

    <!-- Top margin -->
    <rect x="200" y="80" width="500" height="50" fill="#F2F2F2" opacity="0.6"/>
    <line x1="200" y1="130" x2="700" y2="130" stroke="#BBB" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Top margin label with callout -->
    <line x1="180" y1="105" x2="150" y2="105" stroke="#333" stroke-width="1"/>
    <text x="145" y="110" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Margin</text>

    <!-- Columns and gutters -->
    <!-- Column 1 -->
    <rect x="220" y="140" width="90" height="420" fill="#FFFFFF" stroke="#BBB" stroke-width="0.5"/>
    <!-- Column 2 -->
    <rect x="325" y="140" width="90" height="420" fill="#FFFFFF" stroke="#BBB" stroke-width="0.5"/>
    <!-- Column 3 -->
    <rect x="430" y="140" width="90" height="420" fill="#FFFFFF" stroke="#BBB" stroke-width="0.5"/>

    <!-- Gutter 1 (between col 1 and 2) -->
    <rect x="310" y="140" width="15" height="420" fill="#F2F2F2" opacity="0.4"/>
    <!-- Gutter 2 (between col 2 and 3) -->
    <rect x="415" y="140" width="15" height="420" fill="#F2F2F2" opacity="0.4"/>

    <!-- Column labels with callouts -->
    <!-- Column callout -->
    <line x1="265" y1="135" x2="265" y2="110" stroke="#333" stroke-width="1"/>
    <text x="270" y="115" font-size="11" font-weight="600" fill="#1A1A1A">Column</text>

    <!-- Gutter callout -->
    <line x1="320" y1="135" x2="320" y2="110" stroke="#333" stroke-width="1"/>
    <text x="325" y="115" font-size="11" font-weight="600" fill="#1A1A1A">Gutter</text>

    <!-- Baseline grid lines throughout columns -->
    <line x1="220" y1="165" x2="700" y2="165" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="184" x2="700" y2="184" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="203" x2="700" y2="203" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="222" x2="700" y2="222" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="241" x2="700" y2="241" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="260" x2="700" y2="260" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="279" x2="700" y2="279" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="298" x2="700" y2="298" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="317" x2="700" y2="317" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="336" x2="700" y2="336" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="355" x2="700" y2="355" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="374" x2="700" y2="374" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="393" x2="700" y2="393" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="412" x2="700" y2="412" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="431" x2="700" y2="431" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="450" x2="700" y2="450" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="469" x2="700" y2="469" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>
    <line x1="220" y1="488" x2="700" y2="488" stroke="#E85D3A" stroke-width="0.5" opacity="0.5"/>

    <!-- Baseline Grid label with callout -->
    <line x1="720" y1="184" x2="750" y2="184" stroke="#E85D3A" stroke-width="1.5"/>
    <text x="755" y="189" font-size="11" font-weight="600" fill="#E85D3A">Baseline Grid</text>

    <!-- Sample text module (highlighted) -->
    <g>
      <!-- Module box -->
      <rect x="240" y="270" width="70" height="50" fill="#F2F2F2" stroke="#3B7DD8" stroke-width="1.5" opacity="0.7"/>

      <!-- Text sample with baselines -->
      <text x="250" y="292" font-size="11" font-weight="600" fill="#1A1A1A" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">Module</text>

      <!-- Baseline indicator (thicker line under text) -->
      <line x1="240" y1="297" x2="310" y2="297" stroke="#3B7DD8" stroke-width="1.5"/>

      <!-- Cap height indicator -->
      <line x1="240" y1="280" x2="310" y2="280" stroke="#3B7DD8" stroke-width="1.5"/>
      <line x1="235" y1="278" x2="235" y2="299" stroke="#3B7DD8" stroke-width="1"/>

      <!-- Leading indicator (to next baseline) -->
      <line x1="312" y1="297" x2="312" y2="316" stroke="#3B7DD8" stroke-width="1"/>
    </g>

    <!-- Module label -->
    <line x1="180" y1="295" x2="210" y2="295" stroke="#3B7DD8" stroke-width="1.5"/>
    <text x="175" y="300" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Module</text>

    <!-- Font Size (cap height) label -->
    <line x1="180" y1="280" x2="200" y2="280" stroke="#3B7DD8" stroke-width="1"/>
    <text x="175" y="285" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Font Size</text>

    <!-- Baseline label -->
    <line x1="180" y1="297" x2="210" y2="297" stroke="#3B7DD8" stroke-width="1.5"/>
    <text x="175" y="302" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Baseline</text>

    <!-- Leading label (right side) -->
    <line x1="720" y1="297" x2="750" y2="297" stroke="#3B7DD8" stroke-width="1"/>
    <text x="755" y="302" font-size="11" font-weight="600" fill="#1A1A1A">Leading</text>

    <!-- Point/Hierarchy label (left side, lower) -->
    <line x1="180" y1="380" x2="210" y2="380" stroke="#3B7DD8" stroke-width="1.5"/>
    <text x="175" y="385" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Point</text>

    <!-- Modular Grid label (right side, lower) -->
    <line x1="720" y1="350" x2="750" y2="350" stroke="#3B7DD8" stroke-width="1"/>
    <text x="755" y="355" font-size="11" font-weight="600" fill="#1A1A1A">Modular Grid</text>

    <!-- Alignment label (right side) -->
    <line x1="720" y1="430" x2="750" y2="430" stroke="#3B7DD8" stroke-width="1"/>
    <text x="755" y="435" font-size="11" font-weight="600" fill="#1A1A1A">Alignment</text>

    <!-- Hierarchy label (left side, bottom) -->
    <line x1="180" y1="450" x2="210" y2="450" stroke="#3B7DD8" stroke-width="1.5"/>
    <text x="175" y="455" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Hierarchy</text>

    <!-- White Space label (bottom right) -->
    <rect x="680" y="510" width="50" height="30" fill="#FFFFFF" stroke="#777" stroke-width="1" opacity="0.5"/>
    <line x1="720" y1="495" x2="750" y2="495" stroke="#777" stroke-width="1"/>
    <text x="755" y="500" font-size="11" font-weight="600" fill="#1A1A1A">White Space</text>

    <!-- Bottom margin -->
    <rect x="200" y="530" width="500" height="50" fill="#F2F2F2" opacity="0.6"/>
    <line x1="200" y1="530" x2="700" y2="530" stroke="#BBB" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Bottom margin label with callout -->
    <line x1="180" y1="555" x2="150" y2="555" stroke="#333" stroke-width="1"/>
    <text x="145" y="560" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="end">Margin</text>
  </g>

  <!-- Legend at bottom -->
  <g>
    <line x1="150" y1="605" x2="750" y2="605" stroke="#BBB" stroke-width="1"/>
    <text x="200" y="625" font-size="11" fill="#777">Red = Baseline Grid  |  Blue = Module &amp; Spacing  |  Dashed = Guides &amp; Boundaries</text>
  </g>
</svg>
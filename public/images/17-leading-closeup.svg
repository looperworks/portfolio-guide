<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      text { fill: #333; }
      .label { font-size: 11px; fill: #777; }
      .label-bold { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .title { font-size: 16px; fill: #1A1A1A; font-weight: 600; }
      .subtitle { font-size: 11px; fill: #999; letter-spacing: 2px; text-transform: uppercase; }
      .grid-col { stroke: #3B7DD8; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .grid-row { stroke: #E85D3A; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .margin-line { stroke: #BBB; stroke-width: 1; stroke-dasharray: 6,4; }
      .page-border { fill: #FAFAFA; stroke: #D0D0D0; stroke-width: 1.5; }
      .module-fill { fill: #F0F4FA; stroke: none; }
      .callout-line { stroke: #333; stroke-width: 0.75; }
      .callout-dot { fill: #333; }
      .dim-line { stroke: #BBB; stroke-width: 0.75; }
      .accent-blue { fill: #3B7DD8; }
      .accent-red { fill: #E85D3A; }
      .white-text { font-size: 11px; fill: #FFF; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2000" height="2000" fill="white"/>


  <text x="400" y="32" text-anchor="middle" class="title">Leading: A Close-Up View</text>

  <!-- Letters row 1 -->
  <g transform="translate(50,55)">
    <line x1="0" y1="30" x2="420" y2="30" stroke="#BBB" stroke-width="0.7" stroke-dasharray="4,3"/>
    <text x="0" y="25" class="label-bold">Cap Height</text>
    <line x1="0" y1="105" x2="420" y2="105" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="0" y="122" class="label-bold">Baseline</text>
    <rect x="55" y="40" width="28" height="65" fill="#D0D0D0" rx="2"/>
    <rect x="92" y="58" width="22" height="47" fill="#D0D0D0" rx="2"/>
    <rect x="125" y="45" width="30" height="60" fill="#D0D0D0" rx="2"/>
    <rect x="168" y="55" width="20" height="50" fill="#D0D0D0" rx="2"/>
    <rect x="200" y="38" width="32" height="67" fill="#D0D0D0" rx="2"/>
    <rect x="245" y="50" width="24" height="55" fill="#D0D0D0" rx="2"/>
    <rect x="282" y="42" width="28" height="63" fill="#D0D0D0" rx="2"/>
    <rect x="322" y="55" width="22" height="50" fill="#D0D0D0" rx="2"/>
    <rect x="358" y="40" width="30" height="65" fill="#D0D0D0" rx="2"/>
  </g>

  <!-- Letters row 2 -->
  <g transform="translate(50,175)">
    <line x1="0" y1="30" x2="420" y2="30" stroke="#BBB" stroke-width="0.7" stroke-dasharray="4,3"/>
    <line x1="0" y1="105" x2="420" y2="105" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="55" y="42" width="24" height="63" fill="#D0D0D0" rx="2"/>
    <rect x="90" y="55" width="26" height="50" fill="#D0D0D0" rx="2"/>
    <rect x="130" y="44" width="30" height="61" fill="#D0D0D0" rx="2"/>
    <rect x="175" y="52" width="22" height="53" fill="#D0D0D0" rx="2"/>
    <rect x="210" y="38" width="28" height="67" fill="#D0D0D0" rx="2"/>
    <rect x="252" y="56" width="20" height="49" fill="#D0D0D0" rx="2"/>
    <rect x="285" y="46" width="28" height="59" fill="#D0D0D0" rx="2"/>
    <rect x="325" y="52" width="24" height="53" fill="#D0D0D0" rx="2"/>
    <rect x="362" y="44" width="30" height="61" fill="#D0D0D0" rx="2"/>
  </g>

  <!-- Right: dimension annotations -->
  <line x1="510" y1="85" x2="510" y2="160" stroke="#3B7DD8" stroke-width="1.5"/>
  <line x1="505" y1="85" x2="515" y2="85" stroke="#3B7DD8" stroke-width="1.5"/>
  <line x1="505" y1="160" x2="515" y2="160" stroke="#3B7DD8" stroke-width="1.5"/>
  <text x="530" y="115" class="label-bold">Font Size:</text>
  <text x="530" y="130" class="label-bold">10pt</text>

  <line x1="510" y1="160" x2="510" y2="280" stroke="#E85D3A" stroke-width="1.5"/>
  <line x1="505" y1="160" x2="515" y2="160" stroke="#E85D3A" stroke-width="1.5"/>
  <line x1="505" y1="280" x2="515" y2="280" stroke="#E85D3A" stroke-width="1.5"/>
  <text x="530" y="205" class="label" fill="#E85D3A" font-weight="600">Leading =</text>
  <text x="530" y="220" class="label" fill="#E85D3A" font-weight="600">Floor-to-floor</text>
  <text x="530" y="252" class="label" fill="#E85D3A" font-weight="600">Leading:</text>
  <text x="530" y="267" class="label" fill="#E85D3A" font-weight="600">12pt</text>

  <!-- Architectural analogy -->
  <rect x="620" y="75" width="160" height="220" fill="none" stroke="#BBB" stroke-width="0.7" stroke-dasharray="4,3" rx="3"/>
  <line x1="630" y1="130" x2="770" y2="130" stroke="#E85D3A" stroke-width="1"/>
  <line x1="630" y1="185" x2="770" y2="185" stroke="#E85D3A" stroke-width="1"/>
  <line x1="630" y1="240" x2="770" y2="240" stroke="#E85D3A" stroke-width="1"/>
  <text x="700" y="320" text-anchor="middle" class="label" font-style="italic">Architectural Analogy:</text>
  <text x="700" y="334" text-anchor="middle" class="label">Leading is like floor-to-floor</text>
  <text x="700" y="348" text-anchor="middle" class="label">height in a building section</text>

  <!-- Bottom note -->
  <rect x="60" y="385" width="680" height="28" fill="#FAFAFA" rx="14"/>
  <text x="400" y="403" text-anchor="middle" class="label-bold">Leading controls the vertical distance from baseline to baseline (not just the space between lines)</text>

</svg>
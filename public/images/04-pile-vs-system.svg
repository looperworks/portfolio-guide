<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      text { fill: #333; }
      .label { font-size: 11px; fill: #777; }
      .label-bold { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .title { font-size: 16px; fill: #1A1A1A; font-weight: 600; }
      .subtitle { font-size: 11px; fill: #999; letter-spacing: 2px; text-transform: uppercase; }
      .grid-col { stroke: #3B7DD8; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .grid-row { stroke: #E85D3A; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .margin-line { stroke: #BBB; stroke-width: 1; stroke-dasharray: 6,4; }
      .page-border { fill: #FAFAFA; stroke: #D0D0D0; stroke-width: 1.5; }
      .module-fill { fill: #F0F4FA; stroke: none; }
      .callout-line { stroke: #333; stroke-width: 0.75; }
      .callout-dot { fill: #333; }
      .dim-line { stroke: #BBB; stroke-width: 0.75; }
      .accent-blue { fill: #3B7DD8; }
      .accent-red { fill: #E85D3A; }
      .white-text { font-size: 11px; fill: #FFF; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2000" height="2000" fill="white"/>


  <text x="400" y="36" text-anchor="middle" class="title">Content Without vs. With a Grid</text>

  <!-- LEFT: Pile -->
  <rect x="30" y="55" width="340" height="400" class="page-border" rx="3"/>
  <g transform="translate(70,90) rotate(-8)">
    <rect x="0" y="0" width="70" height="90" fill="white" stroke="#D0D0D0"/>
    <line x1="10" y1="18" x2="60" y2="18" stroke="#D0D0D0" stroke-width="0.5"/>
    <circle cx="35" cy="55" r="10" fill="#FAFAFA" stroke="#D0D0D0"/>
  </g>
  <g transform="translate(175,110) rotate(12)">
    <rect x="0" y="0" width="85" height="65" fill="#E8F0FA" stroke="#3B7DD8" stroke-width="0.7" opacity="0.8"/>
    <circle cx="42" cy="30" r="16" fill="#3B7DD8" opacity="0.15"/>
  </g>
  <g transform="translate(90,240)">
    <rect x="0" y="0" width="120" height="55" fill="white" stroke="#D0D0D0"/>
    <line x1="10" y1="14" x2="110" y2="14" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="26" x2="105" y2="26" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="38" x2="95" y2="38" stroke="#333" stroke-width="0.5"/>
  </g>
  <g transform="translate(185,305) rotate(-5)">
    <rect x="0" y="0" width="95" height="60" fill="none" stroke="#E85D3A" stroke-dasharray="4,3"/>
    <polygon points="30,15 48,45 12,45" fill="#E85D3A" opacity="0.15"/>
  </g>
  <text x="200" y="480" text-anchor="middle" class="label" fill="#E85D3A" font-weight="600">A pile of materials</text>

  <!-- RIGHT: System -->
  <rect x="430" y="55" width="340" height="400" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="3"/>
  <line x1="600" y1="55" x2="600" y2="455" stroke="#D0D0D0" stroke-width="0.5"/>
  <line x1="430" y1="180" x2="770" y2="180" stroke="#D0D0D0" stroke-width="0.5"/>
  <line x1="430" y1="300" x2="770" y2="300" stroke="#D0D0D0" stroke-width="0.5"/>
  <!-- Content blocks -->
  <rect x="445" y="70" width="140" height="95" fill="#FAFAFA" stroke="#D0D0D0" stroke-width="0.5"/>
  <rect x="615" y="70" width="140" height="95" fill="#E8F0FA" stroke="#3B7DD8" stroke-width="0.5"/>
  <circle cx="685" cy="115" r="20" fill="#3B7DD8" opacity="0.12"/>
  <rect x="445" y="195" width="140" height="90" fill="#FAFAFA" stroke="#D0D0D0" stroke-width="0.5"/>
  <line x1="455" y1="210" x2="575" y2="210" stroke="#333" stroke-width="0.4"/>
  <line x1="455" y1="222" x2="570" y2="222" stroke="#333" stroke-width="0.4"/>
  <line x1="455" y1="234" x2="565" y2="234" stroke="#333" stroke-width="0.4"/>
  <line x1="455" y1="246" x2="570" y2="246" stroke="#333" stroke-width="0.4"/>
  <rect x="615" y="195" width="140" height="90" fill="none" stroke="#E85D3A" stroke-width="0.5"/>
  <polygon points="660,215 685,260 635,260" fill="#E85D3A" opacity="0.12"/>
  <rect x="445" y="315" width="310" height="70" fill="#FFF5F0" stroke="#E85D3A" stroke-width="0.5"/>
  <line x1="455" y1="330" x2="740" y2="330" stroke="#E85D3A" stroke-width="0.3" opacity="0.4"/>
  <line x1="455" y1="342" x2="735" y2="342" stroke="#E85D3A" stroke-width="0.3" opacity="0.4"/>
  <line x1="455" y1="354" x2="730" y2="354" stroke="#E85D3A" stroke-width="0.3" opacity="0.4"/>
  <text x="600" y="480" text-anchor="middle" class="label" fill="#3B7DD8" font-weight="600">A coherent system</text>

</svg>
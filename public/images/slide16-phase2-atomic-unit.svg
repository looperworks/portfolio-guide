<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      text { fill: #333; }
      .label { font-size: 11px; fill: #777; }
      .label-bold { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .title { font-size: 16px; fill: #1A1A1A; font-weight: 600; }
      .subtitle { font-size: 11px; fill: #999; letter-spacing: 2px; text-transform: uppercase; }
      .step-num { font-size: 16px; fill: white; font-weight: 600; }
      .step-title { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .step-desc { font-size: 11px; fill: #777; }
      .panel-label { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .panel-box { fill: #FAFAFA; stroke: #D0D0D0; stroke-width: 1; }
      .dialog-header { fill: #2A2A2A; }
      .dialog-body { fill: #FAFAFA; stroke: #AAAAAA; stroke-width: 1; }
      .field-label { font-size: 11px; fill: #555; }
      .field-value { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .accent-fill { fill: #3B7DD8; }
      .accent-green { fill: #4CAF50; }
      .accent-orange { fill: #E85D3A; }
      .accent-purple { fill: #7E57C2; }
      .dim-line { stroke: #D0D0D0; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .baseline-line { stroke: #E85D3A; stroke-width: 0.5; opacity: 0.5; }
      .col-line { stroke: #3B7DD8; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .row-line { stroke: #3B7DD8; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .margin-line { stroke: #BBB; stroke-width: 1; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" fill="white"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="subtitle">PHASE 2</text>
  <text x="400" y="52" text-anchor="middle" class="title">Technical Execution of the "Atomic Unit"</text>

  <!-- ============================================ -->
  <!-- TOP: 4 Steps -->
  <!-- ============================================ -->

  <!-- Step 1 -->
  <circle cx="40" cy="86" r="12" class="accent-fill"/>
  <text x="40" y="90" text-anchor="middle" class="step-num">1</text>
  <text x="60" y="83" class="step-title">Document Setup</text>
  <text x="60" y="97" class="step-desc">Units: Points | Width: 600pt | Height: 840pt | 14 pages (7 spreads) | Facing Pages</text>

  <!-- Step 2 -->
  <circle cx="40" cy="133" r="12" class="accent-green"/>
  <text x="40" y="137" text-anchor="middle" class="step-num">2</text>
  <text x="60" y="130" class="step-title">Baseline Grid</text>
  <text x="60" y="144" class="step-desc">Preferences > Grids | Start: 0pt (Top Margin) | Increment: 12pt | View > Show Baseline Grid</text>

  <!-- Step 3 -->
  <circle cx="40" cy="180" r="12" class="accent-orange"/>
  <text x="40" y="184" text-anchor="middle" class="step-num">3</text>
  <text x="60" y="173" class="step-title">Margins &amp; Columns</text>
  <text x="60" y="187" class="step-desc">Layout > Margins and Columns | Top: 36pt | Bottom: 48pt | Inside/Outside: 36pt | 6 columns, 12pt gutter</text>

  <!-- Step 4 -->
  <circle cx="40" cy="227" r="12" class="accent-purple"/>
  <text x="40" y="231" text-anchor="middle" class="step-num">4</text>
  <text x="60" y="220" class="step-title">Modular Grid (Rows)</text>
  <text x="60" y="234" class="step-desc">Layout > Create Guides | 8 rows, 12pt gutter | Fit Guides to: Margins | Result: 7 content lines + 1 gutter</text>

  <!-- Divider -->
  <line x1="25" y1="260" x2="775" y2="260" class="dim-line"/>

  <!-- ============================================ -->
  <!-- BOTTOM LEFT: 3 Dialog Boxes (A, B, C) -->
  <!-- ============================================ -->

  <!-- Dialog A: Preferences > Grids -->
  <rect x="30" y="280" width="210" height="160" class="dialog-body" rx="4"/>
  <rect x="30" y="280" width="210" height="22" rx="4" class="dialog-header"/>
  <text x="135" y="295" text-anchor="middle" font-size="11px" fill="white" font-weight="600">Preferences > Grids</text>

  <text x="48" y="322" class="field-label">Start:</text>
  <rect x="105" y="310" width="120" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="112" y="323" class="field-value">0pt</text>

  <text x="48" y="352" class="field-label">Relative To:</text>
  <rect x="105" y="340" width="120" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="112" y="353" class="field-value">Top Margin</text>

  <text x="48" y="382" class="field-label">Increment Every:</text>
  <rect x="150" y="370" width="75" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="157" y="383" class="field-value">12pt</text>

  <!-- OK button -->
  <rect x="175" y="410" width="50" height="20" rx="4" fill="#3B7DD8"/>
  <text x="200" y="424" text-anchor="middle" font-size="10px" fill="white" font-weight="600">OK</text>

  <!-- Arrow A to B -->
  <text x="253" y="365" font-size="16px" fill="#999">&#x25B6;</text>

  <!-- Dialog B: Margins and Columns -->
  <rect x="280" y="280" width="210" height="160" class="dialog-body" rx="4"/>
  <rect x="280" y="280" width="210" height="22" rx="4" class="dialog-header"/>
  <text x="385" y="295" text-anchor="middle" font-size="11px" fill="white" font-weight="600">Margins and Columns</text>

  <text x="298" y="320" class="field-label">Top:</text>
  <rect x="355" y="308" width="60" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="362" y="321" class="field-value">36pt</text>
  <text x="422" y="320" font-size="9px" fill="#999">(12x3)</text>

  <text x="298" y="345" class="field-label">Bottom:</text>
  <rect x="355" y="333" width="60" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="362" y="346" class="field-value">48pt</text>
  <text x="422" y="345" font-size="9px" fill="#999">(12x4)</text>

  <text x="298" y="370" class="field-label">Inside/Outside:</text>
  <rect x="390" y="358" width="60" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="397" y="371" class="field-value">36pt</text>

  <text x="298" y="395" class="field-label">Columns:</text>
  <rect x="355" y="383" width="35" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="362" y="396" class="field-value">6</text>
  <text x="398" y="395" class="field-label">Gutter:</text>
  <rect x="435" y="383" width="40" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="442" y="396" class="field-value">12pt</text>

  <!-- OK button -->
  <rect x="425" y="410" width="50" height="20" rx="4" fill="#3B7DD8"/>
  <text x="450" y="424" text-anchor="middle" font-size="10px" fill="white" font-weight="600">OK</text>

  <!-- Arrow B to C -->
  <text x="503" y="365" font-size="16px" fill="#999">&#x25B6;</text>

  <!-- Dialog C: Create Guides -->
  <rect x="530" y="280" width="210" height="160" class="dialog-body" rx="4"/>
  <rect x="530" y="280" width="210" height="22" rx="4" class="dialog-header"/>
  <text x="635" y="295" text-anchor="middle" font-size="11px" fill="white" font-weight="600">Layout > Create Guides</text>

  <text x="548" y="322" class="field-label">Rows:</text>
  <rect x="605" y="310" width="50" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="612" y="323" class="field-value">8</text>

  <text x="548" y="352" class="field-label">Gutter:</text>
  <rect x="605" y="340" width="50" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="612" y="353" class="field-value">12pt</text>

  <text x="548" y="382" class="field-label">Fit Guides to:</text>
  <rect x="635" y="370" width="90" height="18" rx="2" fill="white" stroke="#CCC" stroke-width="0.75"/>
  <text x="642" y="383" class="field-value">Margins</text>

  <!-- OK button -->
  <rect x="675" y="410" width="50" height="20" rx="4" fill="#3B7DD8"/>
  <text x="700" y="424" text-anchor="middle" font-size="10px" fill="white" font-weight="600">OK</text>

  <!-- Dialog labels -->
  <text x="135" y="452" text-anchor="middle" class="label-bold">A</text>
  <text x="385" y="452" text-anchor="middle" class="label-bold">B</text>
  <text x="635" y="452" text-anchor="middle" class="label-bold">C</text>

  <!-- Divider -->
  <line x1="25" y1="465" x2="775" y2="465" class="dim-line"/>

  <!-- ============================================ -->
  <!-- BOTTOM: Result page with both grids -->
  <!-- ============================================ -->

  <text x="400" y="488" text-anchor="middle" class="label-bold">Result: 600 x 840pt Page with Both Grids Active</text>

  <!-- Page outline -->
  <rect x="270" y="500" width="260" height="195" fill="white" stroke="#AAAAAA" stroke-width="1.5" rx="2"/>

  <!-- Margins (dashed) -->
  <rect x="290" y="512" width="220" height="170" fill="none" stroke="#BBB" stroke-width="0.75" stroke-dasharray="6,4"/>

  <!-- Margin labels -->
  <text x="400" y="508" text-anchor="middle" font-size="8px" fill="#BBB">36pt</text>
  <text x="276" y="597" font-size="8px" fill="#BBB" transform="rotate(-90,276,597)">36pt</text>
  <text x="524" y="597" font-size="8px" fill="#BBB" transform="rotate(90,524,597)">36pt</text>

  <!-- 6 Column lines (blue dashed) -->
  <line x1="327" y1="512" x2="327" y2="682" class="col-line"/>
  <line x1="363" y1="512" x2="363" y2="682" class="col-line"/>
  <line x1="400" y1="512" x2="400" y2="682" class="col-line"/>
  <line x1="437" y1="512" x2="437" y2="682" class="col-line"/>
  <line x1="473" y1="512" x2="473" y2="682" class="col-line"/>

  <!-- 8 Row lines (blue dashed) -->
  <line x1="290" y1="533" x2="510" y2="533" class="row-line"/>
  <line x1="290" y1="554" x2="510" y2="554" class="row-line"/>
  <line x1="290" y1="575" x2="510" y2="575" class="row-line"/>
  <line x1="290" y1="596" x2="510" y2="596" class="row-line"/>
  <line x1="290" y1="617" x2="510" y2="617" class="row-line"/>
  <line x1="290" y1="638" x2="510" y2="638" class="row-line"/>
  <line x1="290" y1="659" x2="510" y2="659" class="row-line"/>

  <!-- Baseline grid lines (orange, fine) -->
  <line x1="290" y1="515" x2="510" y2="515" class="baseline-line"/>
  <line x1="290" y1="518" x2="510" y2="518" class="baseline-line"/>
  <line x1="290" y1="521" x2="510" y2="521" class="baseline-line"/>
  <line x1="290" y1="524" x2="510" y2="524" class="baseline-line"/>
  <line x1="290" y1="527" x2="510" y2="527" class="baseline-line"/>
  <line x1="290" y1="530" x2="510" y2="530" class="baseline-line"/>
  <line x1="290" y1="536" x2="510" y2="536" class="baseline-line"/>
  <line x1="290" y1="539" x2="510" y2="539" class="baseline-line"/>
  <line x1="290" y1="542" x2="510" y2="542" class="baseline-line"/>
  <line x1="290" y1="545" x2="510" y2="545" class="baseline-line"/>
  <line x1="290" y1="548" x2="510" y2="548" class="baseline-line"/>
  <line x1="290" y1="551" x2="510" y2="551" class="baseline-line"/>
  <line x1="290" y1="557" x2="510" y2="557" class="baseline-line"/>
  <line x1="290" y1="560" x2="510" y2="560" class="baseline-line"/>
  <line x1="290" y1="563" x2="510" y2="563" class="baseline-line"/>
  <line x1="290" y1="566" x2="510" y2="566" class="baseline-line"/>
  <line x1="290" y1="569" x2="510" y2="569" class="baseline-line"/>
  <line x1="290" y1="572" x2="510" y2="572" class="baseline-line"/>

  <!-- Callout annotations -->
  <!-- Modular grid callout -->
  <line x1="515" y1="535" x2="545" y2="535" stroke="#333" stroke-width="0.75"/>
  <circle cx="515" cy="535" r="2" fill="#333"/>
  <text x="550" y="533" class="label-bold">Modular Grid</text>
  <text x="550" y="545" class="label">6 columns + 8 rows (blue)</text>

  <!-- Baseline grid callout -->
  <line x1="515" y1="570" x2="545" y2="570" stroke="#333" stroke-width="0.75"/>
  <circle cx="515" cy="570" r="2" fill="#333"/>
  <text x="550" y="568" class="label-bold">Baseline Grid</text>
  <text x="550" y="580" class="label">70 lines at 12pt (orange)</text>

  <!-- Margins callout -->
  <line x1="515" y1="620" x2="545" y2="620" stroke="#333" stroke-width="0.75"/>
  <circle cx="515" cy="620" r="2" fill="#333"/>
  <text x="550" y="618" class="label-bold">Margins</text>
  <text x="550" y="630" class="label">36 / 48 / 36 / 36pt (dashed)</text>

  <!-- Legend -->
  <line x1="290" y1="706" x2="305" y2="706" stroke="#3B7DD8" stroke-width="1.5"/>
  <text x="310" y="710" class="label">Modular grid (6 cols + 8 rows)</text>
  <line x1="470" y1="706" x2="485" y2="706" stroke="#E85D3A" stroke-width="1.5"/>
  <text x="490" y="710" class="label">Baseline grid (12pt increment)</text>

</svg>
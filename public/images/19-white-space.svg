<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 545" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      text { fill: #333; }
      .label { font-size: 11px; fill: #777; }
      .label-bold { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .title { font-size: 16px; fill: #1A1A1A; font-weight: 600; }
      .subtitle { font-size: 11px; fill: #999; letter-spacing: 2px; text-transform: uppercase; }
      .grid-col { stroke: #3B7DD8; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .grid-row { stroke: #E85D3A; stroke-width: 0.75; stroke-dasharray: 4,3; }
      .margin-line { stroke: #BBB; stroke-width: 1; stroke-dasharray: 6,4; }
      .page-border { fill: #FAFAFA; stroke: #D0D0D0; stroke-width: 1.5; }
      .module-fill { fill: #F0F4FA; stroke: none; }
      .callout-line { stroke: #333; stroke-width: 0.75; }
      .callout-dot { fill: #333; }
      .dim-line { stroke: #BBB; stroke-width: 0.75; }
      .accent-blue { fill: #3B7DD8; }
      .accent-red { fill: #E85D3A; }
      .white-text { font-size: 11px; fill: #FFF; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2000" height="2000" fill="white"/>


  <text x="400" y="32" text-anchor="middle" class="title">White Space: Designed, Not Residual</text>

  <!-- LEFT: Cramped -->
  <rect x="30" y="55" width="340" height="400" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="3"/>
  <text x="40" y="66" class="label" fill="#E85D3A" font-weight="600">&#x2717;</text>
  <text x="360" y="66" text-anchor="end" class="label" fill="#E85D3A" font-weight="600">&#x2717;</text>
  <rect x="40" y="68" width="320" height="22" fill="#1A1A1A"/>
  <rect x="40" y="100" width="100" height="75" fill="#FAFAFA" stroke="#D0D0D0"/>
  <line x1="150" y1="108" x2="350" y2="108" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="120" x2="345" y2="120" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="132" x2="348" y2="132" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="144" x2="340" y2="144" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="156" x2="346" y2="156" stroke="#333" stroke-width="0.5"/>
  <rect x="40" y="180" width="100" height="75" fill="#FAFAFA" stroke="#D0D0D0"/>
  <line x1="150" y1="188" x2="350" y2="188" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="200" x2="345" y2="200" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="212" x2="348" y2="212" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="224" x2="342" y2="224" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="265" x2="350" y2="265" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="277" x2="345" y2="277" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="289" x2="348" y2="289" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="301" x2="340" y2="301" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="313" x2="346" y2="313" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="325" x2="342" y2="325" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="337" x2="348" y2="337" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="480" text-anchor="middle" class="label-bold">Cramped Layout</text>
  <text x="200" y="495" text-anchor="middle" class="label">No intentional white space</text>

  <!-- RIGHT: Designed -->
  <rect x="430" y="55" width="340" height="400" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="3"/>
  <text x="440" y="66" fill="#2E7D32" class="label" font-weight="600">&#x2713;</text>
  <text x="760" y="66" text-anchor="end" fill="#2E7D32" class="label" font-weight="600">&#x2713;</text>
  <rect x="440" y="68" width="320" height="22" fill="#1A1A1A"/>
  <rect x="450" y="110" width="110" height="80" fill="#FAFAFA" stroke="#D0D0D0"/>
  <line x1="575" y1="118" x2="750" y2="118" stroke="#333" stroke-width="0.5"/>
  <line x1="575" y1="130" x2="740" y2="130" stroke="#333" stroke-width="0.5"/>
  <line x1="575" y1="142" x2="745" y2="142" stroke="#333" stroke-width="0.5"/>

  <!-- White space zone -->
  <rect x="455" y="220" width="300" height="85" fill="none" stroke="#3B7DD8" stroke-width="1.5" stroke-dasharray="6,4" rx="4"/>
  <text x="605" y="260" text-anchor="middle" class="label" fill="#3B7DD8" font-weight="600">Designed void</text>
  <text x="605" y="275" text-anchor="middle" class="label" fill="#3B7DD8" font-weight="600">intentional white space</text>

  <rect x="450" y="330" width="110" height="80" fill="#FAFAFA" stroke="#D0D0D0"/>
  <line x1="575" y1="338" x2="745" y2="338" stroke="#333" stroke-width="0.5"/>
  <line x1="575" y1="350" x2="740" y2="350" stroke="#333" stroke-width="0.5"/>
  <line x1="575" y1="362" x2="743" y2="362" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="480" text-anchor="middle" class="label-bold">Designed Layout</text>
  <text x="600" y="495" text-anchor="middle" class="label">Intentional white space structures the page</text>

  <!-- Bottom note -->
  <text x="400" y="528" text-anchor="middle" class="label" font-style="italic">Architectural analogy: courtyards and voids &#x2014; white space is designed, not leftover.</text>

</svg>